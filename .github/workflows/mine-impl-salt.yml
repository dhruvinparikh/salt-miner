name: Mine RemoteHopV2 Implementation Salt

on:
  workflow_dispatch:
    inputs:
      target_address:
        description: "Target implementation address"
        required: true
        default: "0x0000000087ED0dD8b999aE6C7c30f95e9707a3C6"
      deployer_address:
        description: "CREATE2 deployer address (Nick's Factory)"
        required: true
        default: "0x4e59b44847b379578588920cA78FbF26c0B4956C"
      bytecode_hash:
        description: "zkSync bytecode hash of RemoteHopV2"
        required: true
        default: "0x0100075b76ae9ac5481afa04f066daeb43f25b709358040665df9acce858942a"

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Mine salt
        run: |
          ./target/release/mine-zksync-salt impl \
            --target "${{ github.event.inputs.target_address }}" \
            --deployer "${{ github.event.inputs.deployer_address }}" \
            --bytecode-hash "${{ github.event.inputs.bytecode_hash }}"
